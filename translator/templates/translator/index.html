<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to ISL Translator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <nav class="w-full max-w-4xl mx-auto flex items-center justify-between mb-8 glass-panel py-4 px-8 rounded-2xl">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">ISL Edu</h1>
        <div class="flex gap-4">
            <a href="{% url 'index' %}" class="text-blue-400 font-semibold py-2 px-4 rounded-lg bg-blue-500/10">Translator</a>
            <a href="{% url 'dictionary' %}" class="text-slate-300 hover:text-white transition-colors py-2 px-4 rounded-lg hover:bg-slate-800">Dictionary</a>
        </div>
    </nav>

    <div class="w-full max-w-4xl glass-panel rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <!-- Left Section: Input -->
        <div class="w-full md:w-1/2 p-8 md:p-12 border-b md:border-b-0 md:border-r border-white/10 flex flex-col justify-center">
            <h1 class="text-4xl font-extrabold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                Text to ISL
            </h1>
            <p class="text-slate-400 text-sm mb-8">Translate English text into Indian Sign Language sequences seamlessly.</p>
            
            <form id="translateBox" class="flex flex-col gap-4">
                <textarea id="englishText" rows="4" 
                    class="w-full p-4 rounded-xl bg-slate-800/50 border border-slate-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all resize-none text-slate-200 placeholder-slate-500"
                    placeholder="E.g., I am eating an apple..."></textarea>
                
                <!-- Options Container -->
                <div class="mt-4 flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6 p-4 rounded-xl bg-slate-800/40 border border-slate-700/50">
                    <div class="flex-1 w-full relative">
                        <label for="fallbackOption" class="text-slate-400 text-[11px] uppercase tracking-wider font-bold mb-2 block">Unknown Word Handling</label>
                        <select id="fallbackOption" class="w-full p-2.5 rounded-lg bg-slate-700/50 border border-slate-600 focus:border-blue-500 outline-none text-slate-200 text-sm cursor-pointer appearance-none pr-8">
                            <option value="skip" selected>Skip silently (Default)</option>
                            <option value="spell">Spell out (A-Z)</option>
                            <option value="message">Show alert message</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 pt-6 text-slate-400">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                    
                    <!-- Divider for larger screens -->
                    <div class="hidden sm:block w-px h-12 bg-slate-700"></div>

                    <div class="flex-1 w-full flex flex-col justify-center">
                        <label class="text-slate-400 text-[11px] uppercase tracking-wider font-bold mb-2 block">AI Translation Engine</label>
                        <label class="relative inline-flex items-center cursor-pointer group" id="aiToggleLabel">
                          <input type="checkbox" id="useAiToggle" class="sr-only peer">
                          <div class="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-500 group-hover:bg-slate-600"></div>
                          <span class="ml-3 text-sm font-medium text-slate-300 cursor-pointer">Use BERT/Seq2Seq AI</span>
                        </label>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="mt-6 flex items-center justify-end gap-3 border-t border-slate-700/50 pt-4">
                    <button type="button" id="micBtn" title="Start Voice Dictation"
                        class="p-3 rounded-xl bg-slate-800 hover:bg-red-500/20 text-slate-300 hover:text-red-400 border border-slate-600 hover:border-red-500/50 transition-all flex items-center justify-center group h-[48px] w-[48px]">
                        <svg class="w-6 h-6 transition-transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </button>
                    <button type="submit" id="translateBtn"
                        class="py-3 px-8 h-[48px] rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold shadow-lg shadow-blue-500/30 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Translate Now
                    </button>
                </div>
            </form>
            
            <div id="loadingIndicator" class="hidden mt-6 flex items-center gap-3 text-blue-400">
                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span class="text-sm font-medium">Processing NLP & Matching Signs...</span>
            </div>
            
            <div id="errorBox" class="hidden mt-6 p-4 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
            </div>
        </div>

        <!-- Right Section: Output Display -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col bg-black/20">
            <h2 class="text-xl font-semibold mb-6 text-slate-200 flex items-center justify-between">
                <span>Sign Language Sequence</span>
                <span id="glossCount" class="text-xs font-bold px-2 py-1 rounded bg-slate-800 text-slate-400">0 Glosses</span>
            </h2>
            
            <div id="videoContainer" class="flex-1 rounded-2xl bg-black overflow-hidden relative shadow-inner aspect-video flex items-center justify-center border border-white/5">
                <p id="placeholderText" class="text-slate-500 font-medium text-center px-6">
                    Enter text and click translate to see the signs.
                </p>
                <!-- Video player (hidden until ready) -->
                <video id="islVideoPlayer" class="hidden w-full h-full object-contain" muted playsinline></video>
                <!-- Image player for spelled characters -->
                <img id="islImagePlayer" class="hidden w-full h-full object-contain p-4" alt="Spelled character">
                <!-- Message player for missing words -->
                <div id="islMessagePlayer" class="hidden w-full h-full flex flex-col items-center justify-center p-6 text-center">
                    <svg class="w-12 h-12 text-yellow-500 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    <span id="messageText" class="text-yellow-400 font-semibold text-lg"></span>
                </div>
            </div>
            
            <div class="mt-4">
                <p class="text-sm text-slate-400 mb-2">Current Gloss / Character:</p>
                <div id="currentGlossDisplay" class="h-12 flex items-center px-4 rounded-xl bg-slate-800/80 border border-slate-700 font-mono text-lg text-blue-300 font-bold overflow-x-auto whitespace-nowrap">
                    -
                </div>
            </div>
            
            <!-- Timeline overview -->
             <div class="mt-4">
                <div id="glossTimeline" class="flex gap-2 overflow-x-auto pb-2 scrollbar-thin scrollbar-thumb-slate-700">
                    <!-- Badges for glosses will appear here -->
                </div>
             </div>
        </div>
    </div>

    <!-- CSRF Token for Django -->
    {% csrf_token %}

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('translateBox');
            const textarea = document.getElementById('englishText');
            const btn = document.getElementById('translateBtn');
            const micBtn = document.getElementById('micBtn');
            const loading = document.getElementById('loadingIndicator');
            const errorBox = document.getElementById('errorBox');
            const videoPlayer = document.getElementById('islVideoPlayer');
            const imagePlayer = document.getElementById('islImagePlayer');
            const messagePlayer = document.getElementById('islMessagePlayer');
            const messageText = document.getElementById('messageText');
            const placeholder = document.getElementById('placeholderText');
            const glossDisplay = document.getElementById('currentGlossDisplay');
            const glossTimeline = document.getElementById('glossTimeline');
            const glossCount = document.getElementById('glossCount');
            const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
            
            let timelineAssets = [];
            let currentPlayIndex = 0;
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const text = textarea.value.trim();
                const fallback = document.getElementById('fallbackOption').value;
                const use_ai = document.getElementById('useAiToggle').checked;
                
                if (!text) {
                    showError('Please enter some text to translate.');
                    return;
                }
                
                // UI Reset
                hideError();
                btn.disabled = true;
                btn.classList.add('opacity-70');
                loading.classList.remove('hidden');
                placeholder.classList.add('hidden');
                videoPlayer.classList.add('hidden');
                imagePlayer.classList.add('hidden');
                messagePlayer.classList.add('hidden');
                glossDisplay.textContent = '-';
                glossTimeline.innerHTML = '';
                
                try {
                    const response = await fetch('/api/translate/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken
                        },
                        body: JSON.stringify({ text, fallback, use_ai })
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.error || 'Failed to translate');
                    }
                    
                    handleTranslationResponse(data);
                } catch (err) {
                    showError(err.message);
                } finally {
                    btn.disabled = false;
                    btn.classList.remove('opacity-70');
                    loading.classList.add('hidden');
                }
            });
            
            function handleTranslationResponse(data) {
                // Parse assets into a flat sequence for playback
                timelineAssets = [];
                glossTimeline.innerHTML = '';
                
                glossCount.textContent = `${data.glosses.length} Gloss(es)`;
                
                data.assets.forEach((asset, idx) => {
                    const badge = document.createElement('div');
                    badge.className = 'px-3 py-1 rounded-full text-xs font-semibold whitespace-nowrap opacity-60 transition-opacity bg-slate-800 text-slate-300 border border-slate-700';
                    badge.textContent = asset.gloss.toUpperCase();
                    badge.id = `badge-${idx}`;
                    glossTimeline.appendChild(badge);
                    
                    if (asset.type === 'word') {
                        timelineAssets.push({
                            type: 'video',
                            url: asset.url,
                            gloss: asset.gloss,
                            badgeId: `badge-${idx}`
                        });
                    } else if (asset.type === 'spelled') {
                        // Spread spelled letters
                        asset.letters.forEach(letter => {
                            timelineAssets.push({
                                type: 'image',
                                url: letter.url,
                                gloss: `${asset.gloss} (${letter.char.toUpperCase()})`,
                                badgeId: `badge-${idx}`
                            });
                        });
                    } else if (asset.type === 'message') {
                        timelineAssets.push({
                            type: 'message',
                            message: asset.message,
                            gloss: asset.gloss,
                            badgeId: `badge-${idx}`
                        });
                    }
                });
                
                if (timelineAssets.length > 0) {
                    currentPlayIndex = 0;
                    playNextAsset();
                } else {
                    placeholder.textContent = "No valid signs generated.";
                    placeholder.classList.remove('hidden');
                }
            }
            
            function playNextAsset() {
                if (currentPlayIndex >= timelineAssets.length) {
                    // Loop or stop. Let's Stop for now and show replay button?
                    // Let's loop.
                    currentPlayIndex = 0;
                }
                
                const asset = timelineAssets[currentPlayIndex];
                
                // Highlight gloss badge
                document.querySelectorAll('#glossTimeline div').forEach(b => {
                    b.classList.remove('opacity-100', 'bg-blue-600', 'text-white', 'border-blue-500');
                    b.classList.add('opacity-60', 'bg-slate-800', 'text-slate-300');
                });
                
                const activeBadge = document.getElementById(asset.badgeId);
                if (activeBadge) {
                    activeBadge.classList.replace('opacity-60', 'opacity-100');
                    activeBadge.classList.replace('bg-slate-800', 'bg-blue-600');
                    activeBadge.classList.replace('text-slate-300', 'text-white');
                    activeBadge.classList.add('border-blue-500');
                }
                
                glossDisplay.textContent = asset.gloss.toUpperCase();
                
                if (asset.type === 'video') {
                    imagePlayer.classList.add('hidden');
                    messagePlayer.classList.add('hidden');
                    videoPlayer.classList.remove('hidden');
                    videoPlayer.src = asset.url;
                    
                    videoPlayer.onended = () => {
                        currentPlayIndex++;
                        playNextAsset();
                    };
                    
                    // Fallback if video fails to load
                    videoPlayer.onerror = () => {
                        console.error("Failed to load video:", asset.url);
                        currentPlayIndex++;
                        setTimeout(playNextAsset, 1000);
                    };
                    
                    videoPlayer.play().catch(e => {
                        console.error("Autoplay failed:", e);
                        currentPlayIndex++;
                        setTimeout(playNextAsset, 1000);
                    });
                } else if (asset.type === 'image') {
                    videoPlayer.classList.add('hidden');
                    messagePlayer.classList.add('hidden');
                    imagePlayer.classList.remove('hidden');
                    imagePlayer.src = asset.url;
                    
                    imagePlayer.onerror = () => {
                        imagePlayer.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><rect width="400" height="400" fill="%231e293b"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="200" fill="white">' + asset.gloss.slice(-2, -1).toUpperCase() + '</text></svg>';
                    }
                    
                    // Images stay for 1 second
                    setTimeout(() => {
                        currentPlayIndex++;
                        playNextAsset();
                    }, 1000);
                } else if (asset.type === 'message') {
                    videoPlayer.classList.add('hidden');
                    imagePlayer.classList.add('hidden');
                    messagePlayer.classList.remove('hidden');
                    messageText.textContent = asset.message;
                    
                    setTimeout(() => {
                        currentPlayIndex++;
                        playNextAsset();
                    }, 2000);
                }
            }
            
            // Web Speech API Integration
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            let recognition = null;
            let isRecording = false;

            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'en-US';

                recognition.onstart = () => {
                    isRecording = true;
                    micBtn.classList.remove('text-slate-300', 'bg-slate-700/50', 'border-slate-600');
                    micBtn.classList.add('text-red-500', 'bg-red-500/20', 'border-red-500', 'animate-pulse');
                    textarea.placeholder = "Listening...";
                };

                recognition.onresult = (event) => {
                    let interimTranscript = '';
                    let finalTranscript = '';

                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            interimTranscript += event.results[i][0].transcript;
                        }
                    }

                    if (finalTranscript) {
                        textarea.value = finalTranscript;
                    } else if (interimTranscript) {
                        // Optionally update UI with interim results if desired
                        textarea.value = interimTranscript;
                    }
                };

                recognition.onerror = (event) => {
                    console.error("Speech recognition error:", event.error);
                    showError("Microphone error: " + event.error);
                    stopRecordingUI();
                };

                recognition.onend = () => {
                    stopRecordingUI();
                    // Auto-submit if there's text after recording stops
                    if (textarea.value.trim().length > 0) {
                        form.dispatchEvent(new Event('submit'));
                    }
                };

                micBtn.addEventListener('click', () => {
                    if (isRecording) {
                        recognition.stop();
                    } else {
                        recognition.start();
                    }
                });
            } else {
                micBtn.style.display = 'none'; // Hide mic if not supported by browser
            }

            function stopRecordingUI() {
                isRecording = false;
                micBtn.classList.add('text-slate-300', 'bg-slate-700/50', 'border-slate-600');
                micBtn.classList.remove('text-red-500', 'bg-red-500/20', 'border-red-500', 'animate-pulse');
                textarea.placeholder = "E.g., I am eating an apple...";
            }
            
            function showError(msg) {
                errorBox.textContent = msg;
                errorBox.classList.remove('hidden');
            }
            function hideError() {
                errorBox.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
