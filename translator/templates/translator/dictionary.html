<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text2ISL Dictionary</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: #f8fafc; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col p-6">
    <nav class="w-full max-w-6xl mx-auto flex items-center justify-between mb-8 glass-panel py-4 px-8 rounded-2xl hover:shadow-xl hover:shadow-blue-900/10 transition-all duration-300">
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400 tracking-tight">Text2ISL</h1>
        <div class="flex gap-4">
            <a href="{% url 'index' %}" class="text-slate-300 hover:text-white transition-colors py-2 px-4 rounded-lg hover:bg-slate-800">Translator</a>
            <a href="{% url 'dictionary' %}" class="text-blue-400 font-semibold py-2 px-4 rounded-lg bg-blue-500/10">Dictionary</a>
        </div>
    </nav>

    <div class="w-full max-w-6xl mx-auto glass-panel rounded-3xl shadow-2xl p-8 mb-8">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-extrabold mb-2">ISL Sign Dictionary</h2>
                <p class="text-slate-400">Browse and learn from {{ videos|length }} available Indian Sign Language signs.</p>
            </div>
            <input type="text" id="searchInput" placeholder="Search for a sign..." 
                class="w-full md:w-64 p-3 rounded-xl bg-slate-800/50 border border-slate-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all text-slate-200">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="dictionaryGrid">
            {% for video in videos %}
            <div class="dictionary-card bg-slate-800/40 rounded-2xl overflow-hidden border border-slate-700/50 hover:border-blue-500/50 transition-colors group cursor-pointer" data-words="{{ video.words|lower }}">
                <div class="aspect-video bg-black relative">
                    <video src="{{ video.url }}" class="w-full h-full object-cover" muted playsinline loop onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;"></video>
                    <div class="absolute inset-0 bg-black/40 group-hover:bg-transparent transition-colors flex items-center justify-center pointer-events-none">
                        <svg class="w-10 h-10 text-white opacity-50 group-hover:opacity-0 transition-opacity" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                    </div>
                </div>
                <div class="p-4">
                    <h3 class="font-semibold text-lg text-slate-200 capitalize truncate" title="{{ video.words }}">{{ video.words }}</h3>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('.dictionary-card').forEach(card => {
                if(card.dataset.words.includes(query)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
